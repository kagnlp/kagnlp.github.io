# Beautiful Jekyll / Dean Attali
# 2fc73a3a967e97599c9763d05e564189


# configuration of jekyll-scholar

scholar:
  style: bibliography/ieee-with-url
  #style: acm-siggraph
  locale: en

  group_by: none
  group_order: ascending

  source: bibliography
  bibliography: "*.bib"
  bibliography_template: publications
  #bibliography_template: bibtex

  replace_strings: true
  join_strings:    true
  bibliography_list_tag: ol
  use_raw_bibtex_entry: true
  bibtex_filters:
  - superscript
  - latex
  bibtex_skip_fields:
  - abstract
  - month_numeric
  - paper_url
  - demo_url
  - poster_url
  - slides_url
  - video_url
  - selected
  - code_url
  - src_url
  - keynote
  - note
  - comment
  - rank
  - pub_type
  - hide
  - keyword
  - tweet
  - youtube_id
  - videmo_id
  - presentation_time
  - slideslive_id 
  - keynote_url
  details_dir:    bibliography
  details_layout: bib_detail.html
  repository: documents/pub/ 
  sort_by: year, rank
  order: descending, ascending
  query: "@*"

